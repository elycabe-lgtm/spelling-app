<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Spelling Adventure – Eithan Edition PRO</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Spelling Adventure – Eithan Edition PRO</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f8fafc;   /* 🔥 color sólido SIN animación */

-webkit-overflow-scrolling: touch;
}

.container{
display:flex;
min-height:100vh;
height:auto;
}

.left{
flex:2;
display:flex;
justify-content:center;
align-items:flex-start;
overflow:auto;
padding:10px;
}

.right{
flex:1;
background:#f7f9fb;
padding:20px;
overflow:auto;
}

/* CARD */

.card{
background:white;
padding:30px;
border-radius:30px;
width:900px;
text-align:center;
position:relative;
}

.card::before{
   display:none;
}

@keyframes borderGlow{
0%{background-position:0%}
100%{background-position:300%}
}

/* HEADER */

.header{
display:flex;
align-items:center;
justify-content:space-between;
padding:0 20px;
position:relative;
}

.header h2{
position:relative;
left:auto;
transform:none;
margin:0 auto;

font-size:clamp(26px,3.5vw,40px);
font-weight:900;
letter-spacing:1px;

white-space:nowrap;
flex:1;
text-align:center;
}

.avatarArea{
display:flex;
flex-direction:column;
align-items:center;
gap:6px;
}

.avatar{
width:120px;
height:120px;
object-fit:contain;
}

/* SCORE */

.scoreRow{
display:flex;
justify-content:center;
gap:20px;
font-size:22px;
font-weight:bold;
}

/* =========================
🏆 RANKING PRO VISUAL
========================= */

.rankCard{
background:linear-gradient(135deg,#ffffff,#f1f2f6);
padding:22px;                 /* ⬆ más espacio */
border-radius:20px;
box-shadow:0 12px 25px rgba(0,0,0,0.18);
text-align:center;
margin-top:20px;
}

.fireBar{
font-size:34px;              /* 🔥 MÁS GRANDE */
letter-spacing:6px;
margin-bottom:10px;
}

.rankBadge{
font-size:22px;              /* ⬆ más grande */
font-weight:900;
padding:6px 14px;
border-radius:12px;
display:inline-block;
margin-bottom:10px;
}

.rankStats{
font-size:20px;              /* ⬆ texto más grande */
line-height:1.8;
font-weight:bold;
}

/* PROGRESS */

.progress{
height:14px;
background:#eee;
border-radius:10px;
margin:20px auto;
width:60%;
overflow:hidden;
}

.bar{
height:100%;
background:#6a11cb;
width:0%;
transition:0.4s;
}

/* INPUTS */

select,input{
padding:8px;
border-radius:10px;
margin:5px;
}

/* BUTTONS */

button{
padding:10px 14px;
border-radius:12px;
border:none;
color:#fff;
font-weight:bold;
cursor:pointer;
margin:4px;

transition: transform 0.08s ease;

box-shadow:0 6px 0 rgba(0,0,0,0.2);
}

button:active{
transform:translateY(4px);
box-shadow:0 2px 0 rgba(0,0,0,0.2);
}

button:hover{
transform:scale(1.05);
}

/* BUTTON COLORS */

.start{background:#2ecc71;}
.repeat{background:#3498db;}
.prev{background:#e84393;}
.next{background:#f39c12;}
.practice{background:#6c5ce7;}
.apply{background:#2d3436;}

.show{background:#8e44ad;}
.btn-def{background:#e74c3c;}
.btn-mean{background:#16a085;}
.btn-sent{background:#1abc9c;}
.btn-img{background:#34495e;}

/* OPTIONS */

.option{
width:45%;
display:inline-block;
margin:6px;
padding:14px;
background:#ecf0f1;
border-radius:12px;
cursor:pointer;
font-size:22px;
text-align:center;
transition:0.2s;
}

.option:hover{
background:#dfe6e9;
transform:scale(1.05);
}

/* WORD */

#word{
font-size:50px;
margin:20px;
font-weight:bold;
}

/* 🔥 TYPING MODE */

.typingBox{
margin-top:20px;
display:flex;
flex-direction:column;
align-items:center;
position:sticky;
bottom:20px;
background:white;
padding:10px;
}

.typingInput{
font-size:32px;
padding:12px;
border-radius:12px;
border:2px solid #ccc;
width:300px;
text-align:center;
outline:none;
}

.letterFeedback{
margin-top:10px;
font-size:40px;     /* 🔥 MÁS GRANDE */
letter-spacing:6px;
font-weight:bold;   /* 🔥 NEGRITA */
}

.correctLetter{
color:#2ecc71;
}

.wrongLetter{
color:#e74c3c;
}

/* WORD LIST */

.wordList{
display:flex;
gap:10px;
overflow-x:auto;
}

.column{
min-width:160px;
font-size:13px;
}

/* DICTIONARY */

.dictCard{
background:linear-gradient(180deg,#ffffff,#f8fbff);
padding:25px;
border-radius:25px;
box-shadow:0 15px 30px rgba(0,0,0,0.15);
text-align:center;
cursor:pointer;
}

.dictImage{
width:140px;
height:140px;
object-fit:contain;
margin-bottom:10px;
}

.dictWord{
font-size:clamp(18px,4vw,48px);  /* 🔥 MÁS REACTIVO */
font-weight:900;
color:#2c3e50;
letter-spacing:0.3px;
line-height:1.05;
margin:8px 0;
text-align:center;

white-space:nowrap;
overflow:hidden;
text-overflow:ellipsis;

max-width:100%;
}

/* =========================
🔊 WORD PRONUNCIATION EFFECT
========================= */

@keyframes wordBounce{
   0%{
      transform:scale(1);
      opacity:0.8;
   }
   40%{
      transform:scale(1.3);
   }
   60%{
      transform:scale(1.15);
   }
   100%{
      transform:scale(1.2);
      opacity:1;
   }
}

.wordSpeaking{
   animation:wordBounce 0.9s ease;
   transform:scale(1.2);
   color:#6c5ce7;
   text-shadow:0 0 12px rgba(108,92,231,0.9);
   filter:brightness(1.2);
   transition:0.2s ease;
}
.dictPhon{
color:#9b59b6;
font-style:italic;
margin-bottom:10px;
}

.dictCard div:not(.dictWord){
font-size:clamp(16px,2.5vw,20px);
}

.label{
font-weight:bold;
margin-top:12px;
padding:4px 10px;
border-radius:8px;
color:#fff;
display:inline-block;
min-width:100px;

font-size:clamp(11px,1.2vw,13px);

/* 🔥 AGREGA ESTO */
cursor:pointer;
transition:0.2s;

}

.label:hover{
   transform:scale(1.08);
   filter:brightness(1.1);
}

/* =========================
🔊 ACTIVE SPEAKING EFFECT
========================= */

.label.active{
   transform:scale(1.12);
   filter:brightness(1.3);
   box-shadow:0 0 12px rgba(255,255,255,0.8);
}

@keyframes pulseGlow{
   0%{ box-shadow:0 0 5px rgba(255,255,255,0.5); }
   50%{ box-shadow:0 0 20px rgba(255,255,255,1); }
   100%{ box-shadow:0 0 5px rgba(255,255,255,0.5); }
}

.label.active{
   animation:pulseGlow 1s infinite;
}

#output{
font-size:24px;
line-height:1.6;
margin-top:15px;
}

.label.def{background:#e74c3c;}
.label.mean{background:#16a085;}
.label.sent{background:#f39c12;}

/* =========================
✨ WORD POP ANIMATION
========================= */

@keyframes wordPop{

0%{
transform:scale(0.7);
opacity:0;
}

60%{
transform:scale(1.08);
opacity:1;
}

100%{
transform:scale(1);
}

}

/* IMAGE MODE PRO */

.imageGrid{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:12px;
margin-top:10px;
}

.imageOption{
width:140px;
height:140px;
background:#ecf0f1;
border-radius:16px;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
transition:0.2s;
}

.imageOption:hover{
transform:scale(1.05);
background:#dfe6e9;
}

.imageOption img{
max-width:90%;
max-height:90%;
object-fit:contain;
}

/* =========================
🧠 MEMORY MATCH MODE
========================= */

.memoryGrid{
display:grid;
grid-template-columns:repeat(auto-fit,110px);
gap:14px;
justify-content:center;
margin-top:20px;
margin-bottom:90px;
}

.memoryCard{
width:120px;
height:120px;
perspective:1000px;
cursor:pointer;
transition:transform .2s;
}

.memoryInner{
width:100%;
height:100%;
position:relative;
transform-style:preserve-3d;
transition:transform .6s cubic-bezier(.4,.2,.2,1);
}

.memoryCard.flipped .memoryInner{
transform:rotateY(180deg) scale(1.05);
}

.memoryFront,
.memoryBack{
position:absolute;
width:100%;
height:100%;
backface-visibility:hidden;
border-radius:14px;
display:flex;
align-items:center;
justify-content:center;
font-size:20px;
font-weight:bold;
}

.memoryFront{
color:white;
font-size:28px;
background:linear-gradient(145deg,#6a11cb,#2575fc);
box-shadow:0 6px 14px rgba(0,0,0,0.2);
}

.memoryBack{
background:#ffffff;
border:3px solid #6a11cb;
transform:rotateY(180deg);
font-size:22px;
font-weight:900;
color:#2c3e50;
}

.memoryBack img{
max-width:90%;
max-height:90%;
object-fit:contain;
}

.memoryCard:hover{
transform:scale(1.08);
filter:brightness(1.1);
}

.memoryCard img{
max-width:90%;
max-height:90%;
object-fit:contain;
}

/* =========================
🃏 SHUFFLE ANIMATION
========================= */

@keyframes shuffleIn{

0%{
transform:scale(0.2) rotate(-25deg);
opacity:0;
}

60%{
transform:scale(1.1) rotate(10deg);
opacity:1;
}

100%{
transform:scale(1) rotate(0deg);
}

}

.memoryCard{
animation:shuffleIn .45s ease;
}

.memoryHidden{
background:#34495e;
color:#34495e;
}

.memoryMatch{
background:#2ecc71;
color:white;
animation:matchGlow .6s ease;
}

@keyframes matchGlow{

0%{
transform:scale(1);
box-shadow:0 0 0 rgba(46,204,113,0);
}

50%{
transform:scale(1.12);
box-shadow:0 0 25px rgba(46,204,113,.8);
}

100%{
transform:scale(1);
box-shadow:0 0 10px rgba(46,204,113,.4);
}

}

.memoryMatch img{
animation:shine 1.2s infinite alternate;
}

@keyframes shine{

0%{
filter:brightness(1);
}

100%{
filter:brightness(1.4);
}

}

/* =========================
✨ MATCH EXPLOSION
========================= */

@keyframes matchExplosion{

0%{
transform:scale(1);
}

40%{
transform:scale(1.3);
}

70%{
transform:scale(0.9);
}

100%{
transform:scale(1);
}

}

.memoryMatch{
animation:matchExplosion .5s ease;
}


/* =========================
🏆 MEMORY COMPLETE MESSAGE
========================= */

.memoryWin{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:white;
padding:20px 30px;
border-radius:20px;
font-size:32px;
font-weight:bold;
color:#6a11cb;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
animation:memoryPop 0.6s ease;
z-index:10;
}

@keyframes memoryPop{

0%{
transform:translate(-50%,-50%) scale(0.5);
opacity:0;
}

70%{
transform:translate(-50%,-50%) scale(1.1);
opacity:1;
}

100%{
transform:translate(-50%,-50%) scale(1);
}

}

/* =========================
🎰 ROULETTE LETTER
========================= */

@keyframes rouletteSpin{
0%{transform:scale(0.8) rotate(-10deg);opacity:0;}
50%{transform:scale(1.2) rotate(5deg);}
100%{transform:scale(1) rotate(0deg);opacity:1;}
}

.roulette{
animation:rouletteSpin 0.2s ease;
}

/* =========================
🔥 COMBO SYSTEM
========================= */

.comboText{
position:absolute;
top:30%;
left:50%;
transform:translateX(-50%);
font-size:36px;
font-weight:900;
color:#e67e22;
pointer-events:none;
animation:comboPop 0.6s ease;
z-index:20;
}

.fireMode{
color:#e74c3c;
text-shadow:0 0 20px rgba(231,76,60,0.7);
animation:firePulse 0.6s infinite alternate;
}

@keyframes comboPop{
0%{transform:translateX(-50%) scale(0.5);opacity:0;}
70%{transform:translateX(-50%) scale(1.2);opacity:1;}
100%{transform:translateX(-50%) scale(1);}
}

@keyframes firePulse{
0%{transform:translateX(-50%) scale(1);}
100%{transform:translateX(-50%) scale(1.1);}
}

@keyframes fadeIn{
   from{
      opacity:0;
      transform:scale(0.8);
   }
   to{
      opacity:1;
      transform:scale(1);
   }
}


/* =========================
🔍 AUTOCOMPLETE STYLE
========================= */

.autoItem{
   padding:8px;
   background:#ecf0f1;
   margin:4px 0;
   border-radius:8px;
   cursor:pointer;
   font-weight:bold;
   transition:0.15s;
}

.autoItem:hover{
   background:#dfe6e9;
   transform:scale(1.03);
}

/* =========================
🎴 CARD POP EFFECT
========================= */

.dictCard{
   animation:cardPop 0.4s ease;
   transform-origin:center;
}

@keyframes cardPop{
   0%{
      transform:scale(0.85);
      opacity:0;
   }
   60%{
      transform:scale(1.05);
   }
   100%{
      transform:scale(1);
      opacity:1;
   }
}

/* =========================
🖼 IMAGE ANIMATION
========================= */

.dictImage{
   animation:imageZoom 0.6s ease;
}

@keyframes imageZoom{
   0%{
      transform:scale(0.8);
      opacity:0;
   }
   100%{
      transform:scale(1);
      opacity:1;
   }
}

/* HOVER PRO */
.dictCard:hover{
   transform:scale(1.02);
   transition:0.2s;
}

.shieldPop{
   animation: shieldPopAnim 0.6s ease;
}

@keyframes shieldPopAnim{
   0%{ transform:scale(1) }
   40%{ transform:scale(1.3) }
   100%{ transform:scale(1) }
}

.shieldHit{
   animation: shieldHitAnim 0.4s;
}

@keyframes shieldHitAnim{
   0%{ transform:scale(1); filter:brightness(1) }
   30%{ transform:scale(1.2); filter:brightness(2) }
   100%{ transform:scale(1); filter:brightness(1) }
}

/* 🛡️ NIVEL 1 */
.shield1{
   filter:brightness(1);
}

/* 🛡️ NIVEL 2 (azul glow) */
.shield2{
   color:#74b9ff;
   text-shadow:0 0 8px #74b9ff;
}

/* 🛡️ NIVEL 3+ (🔥 dorado PRO) */
.shield3{
   color:gold;
   text-shadow:
      0 0 6px gold,
      0 0 12px orange,
      0 0 20px yellow;
   animation: shieldGlow 1s infinite alternate;
}

/* ✨ animación glow */
@keyframes shieldGlow{
   from{ transform:scale(1) }
   to{ transform:scale(1.15) }
}

.shieldExplode{
   animation: explode 0.5s ease;
}

@keyframes explode{
   0%{ transform:scale(1); filter:brightness(1) }
   50%{ transform:scale(1.6); filter:brightness(3) }
   100%{ transform:scale(1); filter:brightness(1) }
}

.screenFlash{
   animation: flashRed 0.2s;
}

@keyframes flashRed{
   0%{ background:#ff7675 }
   100%{ background:transparent }
}

.heartExplosion{
   position:absolute;
   font-size:28px;
   animation: heartExplode 0.8s ease forwards;
   pointer-events:none;
}

@keyframes heartExplode{
   0%{
      transform:scale(1) translateY(0);
      opacity:1;
   }
   40%{
      transform:scale(1.6) translateY(-10px);
   }
   100%{
      transform:scale(0.5) translateY(-30px);
      opacity:0;
   }
}

/* 💔 estado inicial */
.heartCrack{
   position:absolute;
   font-size:30px;
   pointer-events:none;
   animation: heartAppear 0.3s ease;
}

/* ❤️ aparece */
@keyframes heartAppear{
   from{ transform:scale(0.5); opacity:0 }
   to{ transform:scale(1); opacity:1 }
}

/* 💔 grieta */
.heartCrack.cracked{
   animation: heartShake 0.3s;
}

/* vibración antes de romper */
@keyframes heartShake{
   0%{ transform:translateX(0) }
   25%{ transform:translateX(-3px) }
   50%{ transform:translateX(3px) }
   75%{ transform:translateX(-2px) }
   100%{ transform:translateX(0) }
}

/* 💥 explosión */
.heartExplosion{
   animation: heartExplode 0.5s forwards;
}

@keyframes heartExplode{
   0%{
      transform:scale(1);
      opacity:1;
   }
   50%{
      transform:scale(1.6);
   }
   100%{
      transform:scale(0.3) translateY(-30px);
      opacity:0;
   }
}

#livesUI{
   position:relative;
   display:inline-block;
}

html, body{
   height:100%;
   overflow-x:hidden;
}

/* 🔥 SCROLL CORRECTO EN iPAD */
#gameArea{
   max-height:70vh;
   overflow-y:auto;
   -webkit-overflow-scrolling: touch;
}

/* 📱 AJUSTE RESPONSIVE */
@media (max-width:1024px){

   .container{
      flex-direction:column;
   }

   .left, .right{
      width:100%;
      height:auto;
   }

   .card{
      width:95%;
   }

   .wordList{
      overflow-x:auto;
      display:flex;
   }

   .dictCard{
      width:100%;
   }

   button{
      padding:14px 18px;
      font-size:18px;
   }

   .option{
      font-size:24px;
      padding:18px;
   }

}

/* 🔥 ANIMACIÓN SUAVE */
.fade{
   animation:fadeIn 0.3s ease;
}

@keyframes fadeIn{
   from{opacity:0; transform:translateY(5px);}
   to{opacity:1; transform:translateY(0);}
}

/* ✅ CORRECTO */
.correctFlash{
   animation: correctFlashAnim 0.4s;
}

@keyframes correctFlashAnim{
   0%{ background:rgba(46,204,113,0.7); }  /* verde */
   100%{ background:transparent; }
}

.errorFlash{
   animation: errorFlashAnim 0.4s;
}

@keyframes errorFlashAnim{
   0%{ background:rgba(231,76,60,0.8); }  /* rojo más fuerte */
   50%{ background:rgba(231,76,60,0.4); }
   100%{ background:transparent; }
}

.shakeStrong{
   animation:shakeStrong 0.3s;
}

/* 🎉 CONFETTI */
.confetti{
   position:fixed;
   width:8px;
   height:8px;
   pointer-events:none;
   z-index:9999;
   animation:confettiExplosion 1s ease-out forwards;
}

@keyframes confettiExplosion{
   0%{
      transform:translate(0,0) scale(1);
      opacity:1;
   }
   100%{
      transform:translate(var(--x), var(--y)) scale(0.5);
      opacity:0;
   }
}


/* =========================
FIX CONTROLS iPAD
========================= */

.topControls{
   display:flex;
   flex-wrap:wrap;
   align-items:center;
   justify-content:center;
   gap:10px;
}

/* 🔥 inputs más pequeños */
#from, #to{
   width:60px;
   padding:6px;
}

/* 🔥 selects más compactos */
.topControls select{
   max-width:140px;
}

/* 🔥 botón Apply */
.apply{
   white-space:nowrap;
}


</style>
</head>

<body>

<div class="container">

<!-- LEFT SIDE (GAME) -->
<div class="left">
<div class="card">

<!-- HEADER -->
<div class="header">

<h2>🏆 Spelling Adventure</h2>

<div class="avatarArea">

<img id="avatar" class="avatar" style="display:none;">

<select id="avatarSelect">
<option value="">Selecciona jugador</option>
<option value="eithan">Eithan</option>
<option value="ian">Ian</option>
</select>

</div>

</div>

<!-- SCORE -->
<div class="scoreRow">
<div id="stars"></div>
<div id="score"></div>
</div>
<div id="livesUI" style="font-size:22px;"></div>

<div id="levelUI" style="font-size:20px;font-weight:bold;color:#6a11cb;"></div>

<!-- PROGRESS -->
<div class="progress">
<div id="bar" class="bar"></div>
</div>

<!-- MODES -->
<div>
<select id="mode">
<option value="typing">Typing</option>
<option value="mc">Multiple Choice</option>
<option value="image">Image Mode</option>
<option value="memory">Memory Match</option>
<option value="build">Build Word</option>
<option value="speed">Speed Run</option>
<option value="fill">Fill the Gap</option>
<option value="practice">Practice Mode</option>

</select>

<select id="memoryDifficulty">
<option value="6">Easy (6 pairs)</option>
<option value="8">Medium (8 pairs)</option>
<option value="12">Hard (12 pairs)</option>
</select>

<select id="block"></select>
</div>

<!-- SETTINGS -->
<div class="topControls">

<select id="order">
<option value="seq">Sequential</option>
<option value="rand">Random</option>
</select>

<select id="rangeType">
<option value="all">All</option>
<option value="custom">Custom</option>
</select>

<select id="imageFilter">
<option value="all">All Words</option>
<option value="images">Only With Images</option>
</select>

<input id="from" placeholder="From">
<input id="to" placeholder="To">

<button class="apply" onclick="applySettings()">Apply</button>

</div>

<!-- NAVIGATION -->
<div>
<button class="start" onclick="startGame()">Start</button>
<button class="repeat" onclick="repeatWord()">Repeat</button>
<button class="prev" onclick="prevWord()">Prev</button>
<button class="next" onclick="advanceGame()">Next</button>
<button class="practice" onclick="practiceMistakes()">Practice</button>
</div>

<!-- WORD DISPLAY -->
<div id="word">Press Start</div>

<!-- 🔥 GAME AREA -->
<div id="gameArea"></div>

<div id="gifZone" style="
   position:absolute;
   right:40px;

         score: 0,
         streak: 0,
         fails: 0,
         lastSeen: Date.now(),
         nextReview: Date.now()
      }

// 🏆 DOMINIO (3 aciertos consecutivos)

   // =========================

      interval = 1000 * 60 * 60 * 12
   }
   else if(data.score >= 3){

   }
   else{
      interval = 1000 * 60 * 2
   }

   data.lastSeen = now
   data.nextReview = now + interval

   saveData()
}

// 🧩 FILL GAP HELPER
function hideLetters(word){

   if(!word || typeof word !== "string"){
      console.error("🚨 hideLetters recibió:", word)
      return ""
   }

   const vowels = "aeiouAEIOU"
   let arr = word.split("")

   let mistakes = getMistakes()
   let difficulty = Math.min(0.8, 0.4 + (mistakes.length * 0.07))

   let hiddenIndexes = []

   // vocales
   for(let i=0;i<arr.length;i++){
      if(vowels.includes(arr[i]) && Math.random() < difficulty){
         hiddenIndexes.push(i)
      }
   }

   // asegurar al menos 1
   if(hiddenIndexes.length === 0){
      let possible = arr
         .map((l,i)=> l !== " " ? i : null)
         .filter(i=>i!==null)

      let randomIndex = possible[Math.floor(Math.random()*possible.length)]
      hiddenIndexes.push(randomIndex)
   }

   // extra dificultad
   for(let i=0;i<arr.length;i++){
      if(!hiddenIndexes.includes(i) && Math.random() < difficulty*0.5){
         if(arr[i] !== " ") hiddenIndexes.push(i)
      }
   }

   // 🚨 FIX CLAVE
   if(hiddenIndexes.length >= arr.length){
      hiddenIndexes = hiddenIndexes.slice(0, arr.length-1)
   }

   return arr.map((l,i)=> hiddenIndexes.includes(i) ? "_" : l).join("")
}

function applySettings(){

if(!blockSelect.value || blockSelect.value === ""){
   blockSelect.value = listSelector.value
}

let arr=[...(blocksData[blockSelect.value]||[])]

if(imageFilter.value==="images"){
arr = arr.filter(w => hasImage(w.word))
}

if(rangeType.value==="custom"){

let f=parseInt(from.value)
let t=parseInt(to.value)

if(isNaN(f)) f=1
if(isNaN(t)) t=arr.length

arr=arr.filter(w=>w.num>=f && w.num<=t)
}

/* 🔥 ESTA PARTE FALTABA */
if(order.value==="seq"){

   currentList = arr   // 👈 CLAVE

   index = 0
   correct = 0
   wrong = 0
   streak = 0

   updateUI()
}

/* RANDOM (ya lo tienes bien) */
if(order.value==="rand"){

   let block = blockSelect.value
   let today = getToday()

   if(!randomCycle[block] || randomCycle[block].date !== today){

      randomCycle[block] = {
         phase: "main",
         pending: shuffleArray(arr.map(w=>w.word)),
         errors: [],
         completed: false,
         date: today
      }
   }

   let cycle = randomCycle[block]

   if(cycle.phase === "main"){
      currentList = cycle.pending
         .map(word => arr.find(w => w.word === word))
         .filter(Boolean)
   }

   if(cycle.phase === "review"){
      currentList = cycle.errors
         .map(word => arr.find(w => w.word === word))
         .filter(Boolean)
   }

   index = 0
   correct=0
   wrong=0
   streak=0

   saveCycle()
   updateUI()
}
}

// =========================
// 🧠 WEIGHTED WORD SELECTOR
// =========================

function getWordWeight(word){

   let data = getMastery()[word]

   if(!data){
      return 4   // 🔥 NUEVA palabra = prioridad media-alta
   }

   let score = data.score
   let fails = data.fails || 0

   let weight = 1

   if(score <= 2) weight = 5
   else if(score <= 5) weight = 3
   else if(score <= 8) weight = 1.5
   else weight = 0.5

   // 🚨 errores pesan MÁS que antes
   weight += fails * 2

   return weight
}

function getWeightedWord(list){

let now = Date.now()

// 🔥 solo palabras listas para revisión
let filtered = list.filter(item => {

   let data = getMastery()[item.word]

   // ❌ excluir palabras dominadas
   if(data && data.mastered){
      return false
   }

   if(!data) return true

   return !data.nextReview || data.nextReview <= now
})

// fallback si ninguna cumple
if(filtered.length === 0){

   // 🔥 fallback inteligente (no solo random)
   filtered = list.sort((a,b)=>{
      let wa = getWordWeight(a.word)
      let wb = getWordWeight(b.word)
      return wb - wa
   }).slice(0, Math.ceil(list.length * 0.5))
}

   let weighted = []

  filtered.forEach(item => {

      let weight = getWordWeight(item.word)

      // 🔥 multiplicamos la probabilidad
      for(let i=0;i<Math.floor(weight);i++){
         weighted.push(item)
      }

   })

   // 🛑 seguridad (nunca vacío)
   if(weighted.length === 0){
      return list[Math.floor(Math.random()*list.length)]
   }

   return weighted[Math.floor(Math.random() * weighted.length)]
}

/* =========================
🧠 MULTIPLE CHOICE PRO (ADULTO)
========================= */
function phoneticSimilarity(a,b){

a=a.toLowerCase()
b=b.toLowerCase()

let score=0

for(let i=0;i<Math.min(a.length,b.length);i++){
if(a[i]===b[i]) score++
}

return score
}
function renderMC(w){

let pool=wordDB.filter(x=>x.word!==w.word)

let similar = pool.filter(x=>{

   let a = x.word.toLowerCase()
   let b = w.word.toLowerCase()

   let lenDiff = Math.abs(a.length - b.length)

   // misma longitud o muy cercana
   let lengthCheck = lenDiff <= 1

   // mismo inicio (muy importante para dificultad)
   let startCheck = a[0] === b[0]

   // similitud fonética básica
   let phonScore = phoneticSimilarity(a,b) >= Math.floor(b.length * 0.5)

   // letras similares (al menos 50% iguales)
   let common = 0
   for(let i=0;i<Math.min(a.length,b.length);i++){
      if(a[i] === b[i]) common++
   }

   let similarityCheck = common >= Math.floor(b.length * 0.5)

   return lengthCheck && (startCheck || phonScore || similarityCheck)
})

let difficulty = getDifficulty(w.word)

if(difficulty === "hard"){

   similar = similar.sort((a,b)=>
      phoneticSimilarity(b.word,w.word) - phoneticSimilarity(a.word,w.word)
   ).slice(0,6)

}

let opts=[w.word]

// primero intentar con similares
let maxOptions = difficulty === "hard" ? 6 : 4

// 🔥 SAFE GENERATION (ANTI FREEZE)
let attempts = 0

while(opts.length < maxOptions && attempts < 20){

   let source = similar.length ? similar : pool

   let r = source[Math.floor(Math.random()*source.length)].word

   if(!opts.includes(r)){
      opts.push(r)
   }

   attempts++
}

// fallback seguro
while(opts.length < 4){

   let r = pool[Math.floor(Math.random()*pool.length)].word

   if(!opts.includes(r)){
      opts.push(r)
   }
}

opts=opts.sort(()=>Math.random()-0.5)

opts.forEach(o=>{

let d=document.createElement("div")
d.className="option"
d.innerText=o

d.onclick=()=>{

if(answered) return

document.querySelectorAll(".option").forEach(el=>{
   el.style.pointerEvents = "none"
})

checkAnswer(o)

setTimeout(()=>advanceGame(),400)
}
gameArea.appendChild(d)

})
}

function getLetterBonus(letter){

letter = letter.toLowerCase()

let hard = ["q","z","x","j"]
let medium = ["k","v","w","y"]

if(hard.includes(letter)) return 1
if(medium.includes(letter)) return 0.5

return 0
}

function getAdaptiveAlphabet(){

let mastery = getMastery()

let weakLetters = {}

wordDB.forEach(w=>{

let m = mastery[w.word] || 0

if(m < 2){

let first = w.word[0].toLowerCase()

if(!weakLetters[first]) weakLetters[first]=0

weakLetters[first]++

}

})

let letters = []

for(let l in weakLetters){
for(let i=0;i<weakLetters[l];i++){
letters.push(l)
}
}

if(letters.length < 10){
return "abcdefghijklmnopqrstuvwxyz".split("")
}

return letters
}

function startSpeedGame(input, timerUI, scoreUI){

speedTime=60
speedScore=0
speedTotal=0
usedWords.clear()

input.disabled=false
input.focus()

/* ⚠️ limpiar eventos previos */
input.onkeydown=null

/* ⏱ TIMER */

if(speedTimer) clearInterval(speedTimer)

speedTimer=setInterval(()=>{

speedTime--
timerUI.innerText="Time: "+speedTime

clearInterval(speedTimer)
input.disabled=true

showSpeedResult()

}

},1000) // ✅ AQUÍ se cierra correctamente

/* =========================
VALIDACIÓN (FUERA DEL TIMER)
========================= */

input.onkeydown = async function(e){

   if(e.key==="Enter"){

      let val=input.value
      input.value=""

      let clean = val.trim()

      // ❌ caracteres inválidos
      if(!/^[a-zA-Z\s-]+$/.test(clean)){
         safePlay("wrong")
         return
      }

      let normalized = clean.toLowerCase()

      if(clean.length > 15){
         safePlay("wrong")
         return
      }

      if(globalUsedWords.has(clean)){
         safePlay("wrong")
         return
      }


if(usedWords.size > 200){
   usedWords.clear()
}

      if(usedWords.has(clean)){
         safePlay("wrong")
         return
      }

      // 🔤 validar letra inicial
      if(!normalized.startsWith(speedLetter.toLowerCase())){
         safePlay("wrong")
         return
      }

      // 🌐 VALIDACIÓN
      let existsDB = wordDB.some(w => w.word === clean)

      let existsAPI = false


      let exists = existsDB || existsAPI

      speedTotal++

      if(exists){

         globalUsedWords.add(clean)
         usedWords.add(clean)

         speedCombo++

         let letterBonus = getLetterBonus(speedLetter)
         let points = 1 + (speedCombo * 0.2) + letterBonus

         speedScore += Math.floor(points)

         let tag=document.createElement("span")
         tag.innerText=clean
         tag.style.background="#2ecc71"
         tag.style.color="white"
         tag.style.padding="4px 8px"
         tag.style.borderRadius="8px"

         wordsBox.appendChild(tag)

         safePlay("correct")

      }else{

         safePlay("wrong")
         speedCombo = 0
      }

      scoreUI.innerText = speedScore+" / "+speedTotal

      showCombo(`x${speedCombo}`, speedCombo>=5)
   }
}

}

      // 🔥 errores primero
      let aMistake = mistakes.includes(a.word) ? 1 : 0
      let bMistake = mistakes.includes(b.word) ? 1 : 0

      if(aMistake !== bMistake) return bMistake - aMistake

      // 🧠 dificultad después
      let aScore = mastery[a.word]?.score || 0
      let bScore = mastery[b.word]?.score || 0

      return aScore - bScore
   })
   .map(w => w.word)
   .slice(0,6)

   autocomplete.innerHTML = matches.map(w=>`
   <div class="autoItem" data-word="${w}">
      ${w}
   </div>
   `).join("")

   // 👇 ESTE BLOQUE VA AQUÍ
   document.querySelectorAll(".autoItem").forEach(el=>{
      el.onclick = () => {
         selectWord(el.dataset.word)
      }
   })

} 

dictInput.addEventListener("keydown",e=>{
if(e.key==="Enter"){
selectWord(dictInput.value)
}
})

function searchWord(v){

   let w = wordDB.find(x => x.word.toLowerCase() === v.toLowerCase())

   if(!w) return

   let path = hasImage(w.word) ? getImagePath(w.word) : ""

   dictResult.innerHTML = `
   <div class="dictCard">

      <img class="dictImage"
     src="${path}"
     style="${path ? '' : 'display:none'}"
     onerror="this.style.display='none'">

      <div class="dictWord">${w.word}</div>
      <div class="dictPhon">/${w.phon || ""}/</div>

      <div class="label def" id="btnDef">🔊 Definition</div>
      <div>${w.def || ""}</div>

      <div class="label mean" id="btnMean">🔊 Meaning</div>
      <div>${w.mean || ""}</div>

      <div class="label sent" id="btnSent">🔊 Sentence</div>
      <div>${w.sent || ""}</div>
   `

let card = document.querySelector(".dictCard")

if(card){
   card.classList.remove("cardAnim")
void card.offsetWidth
card.classList.add("cardAnim")
}

   let btnDef = document.getElementById("btnDef")
   let btnMean = document.getElementById("btnMean")
   let btnSent = document.getElementById("btnSent")

   if(btnDef){
   btnDef.onclick = (e) => {
      e.stopPropagation()
      speechSynthesis.cancel()
      animateSpeak(btnDef)

      // ✨ animar palabra
      let dictWord = document.querySelector(".dictWord")
      if(dictWord){
         dictWord.classList.add("wordSpeaking")
         setTimeout(()=>dictWord.classList.remove("wordSpeaking"),1200)
      }

      speak(w.def, 0.75)
   }
}

   if(btnMean){
   btnMean.onclick = (e) => {
      e.stopPropagation()
      speechSynthesis.cancel()
      animateSpeak(btnMean)

      let dictWord = document.querySelector(".dictWord")
      if(dictWord){
         dictWord.classList.add("wordSpeaking")
         setTimeout(()=>dictWord.classList.remove("wordSpeaking"),500)
      }

      speakSpanishFemale(w.mean)
   }
}

   if(btnSent){
   btnSent.onclick = (e) => {
      e.stopPropagation()
      speechSynthesis.cancel()
      animateSpeak(btnSent)

      let dictWord = document.querySelector(".dictWord")
      if(dictWord){
         dictWord.classList.add("wordSpeaking")
         setTimeout(()=>dictWord.classList.remove("wordSpeaking"),500)
      }

      speak(w.sent, 0.75)
   }
}

   let dictWord = document.querySelector(".dictWord")

if(dictWord){

   // 🔊 limpiar audio previo
   speechSynthesis.cancel()

   // ✨ animación
   dictWord.classList.add("wordSpeaking")

   // 🔊 reproducir palabra UNA VEZ
   speak(w.word)

   setTimeout(()=>{
      dictWord.classList.remove("wordSpeaking")
   }, 500)
}}

// 👇 SOLO UNA VEZ
function selectWord(word){

   if(!word) return

   dictInput.value = word
   autocomplete.innerHTML = ""

   searchWord(word)
}


/* CLEAR */
function clearDictionary(){
dictInput.value=""
autocomplete.innerHTML=""
dictResult.innerHTML=""
}

// =========================
// ✨ ANIMATE SPEAKING BUTTON
// =========================

function animateSpeak(el){

   if(!el) return

   el.classList.add("active")

   setTimeout(()=>{
      el.classList.remove("active")
   }, 1200)
}

speechSynthesis.onvoiceschanged = () => {}


</script>
