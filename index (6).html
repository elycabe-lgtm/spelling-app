<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Spelling Adventure – Eithan Edition PRO</title>

<link rel="manifest" href="manifest.json">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Spelling">
<link rel="apple-touch-icon" href="assets/icon-192.png">

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Spelling Adventure – Eithan Edition PRO</title>

<style>

body{
margin:0;
font-family:Arial;

/* 🌈 fondo premium */
background:
linear-gradient(
135deg,
#eef2ff,
#f8fafc,
#f3f0ff,
#ecfeff
);

background-size:400% 400%;

animation:animatedBG 18s ease infinite;

padding-bottom: env(safe-area-inset-bottom);

overflow-x:hidden;

position:relative;

isolation:isolate;
}

@keyframes animatedBG{

0%{
   background-position:0% 50%;
}

50%{
   background-position:100% 50%;
}

100%{
   background-position:0% 50%;
}

}

/* =========================
🌎 WORLDS
========================= */

body[data-world="forest"]{

background:
linear-gradient(
135deg,
#d3f9d8,
#ebfbee,
#f8f9fa
);
}

body[data-world="ice"]{

background:
linear-gradient(
135deg,
#d0ebff,
#e7f5ff,
#f8f9fa
);
}

body[data-world="space"]{

background:
linear-gradient(
135deg,
#1e1b4b,
#312e81,
#0f172a
);

color:white;
}

body[data-world="dino"]{

background:
linear-gradient(
135deg,
#ffe8cc,
#fff4e6,
#f8f9fa
);
}

body[data-world="pirate"]{

background:
linear-gradient(
135deg,
#e9d8a6,
#fefae0,
#f8f9fa
);
}

/* 🌋 volcano */
body[data-world="volcano"]{

background:
linear-gradient(
135deg,
#3b0a0a,
#7f1d1d,
#dc2626
);

color:white;
}

/* ☁️ sky */
body[data-world="sky"]{

background:
linear-gradient(
135deg,
#bae6fd,
#e0f2fe,
#f0f9ff
);
}

/* 🍬 candy */
body[data-world="candy"]{

background:
linear-gradient(
135deg,
#fbcfe8,
#fce7f3,
#fff0f6
);
}

/* 👑 castle */
body[data-world="castle"]{

background:
linear-gradient(
135deg,
#4c1d95,
#6d28d9,
#c4b5fd
);

color:white;
}


/* =========================
🌌 WORLD OVERLAY
========================= */

body::before{

content:"";

position:fixed;

inset:0;

pointer-events:none;

z-index:-1;

opacity:0.45;

animation:
worldGlow 12s ease-in-out infinite;
}

/* 🌳 forest */
body[data-world="forest"]::before{

background:
radial-gradient(
circle at top left,
rgba(34,197,94,0.28),
transparent 45%
),

radial-gradient(
circle at bottom right,
rgba(16,185,129,0.22),
transparent 45%
);
}

/* ❄️ ice */
body[data-world="ice"]::before{

background:
radial-gradient(
circle at top,
rgba(125,211,252,0.35),
transparent 50%
),

radial-gradient(
circle at bottom,
rgba(191,219,254,0.28),
transparent 50%
);
}

/* 🚀 space */
body[data-world="space"]::before{

background:
radial-gradient(
circle at center,
rgba(168,85,247,0.25),
transparent 45%
),

radial-gradient(
circle at top right,
rgba(59,130,246,0.22),
transparent 45%
);
}

/* 🦖 dino */
body[data-world="dino"]::before{

background:
radial-gradient(
circle at top left,
rgba(251,146,60,0.25),
transparent 45%
),

radial-gradient(
circle at bottom right,
rgba(250,204,21,0.18),
transparent 45%
);
}

/* 🏴‍☠️ pirate */
body[data-world="pirate"]::before{

background:
radial-gradient(
circle at center,
rgba(250,204,21,0.22),
transparent 45%
),

radial-gradient(
circle at bottom,
rgba(180,83,9,0.18),
transparent 45%
);
}

/* 🌋 volcano */
body[data-world="volcano"]::before{

background:

radial-gradient(
circle at center,
rgba(255,69,0,0.35),
transparent 40%
),

radial-gradient(
circle at bottom,
rgba(220,38,38,0.28),
transparent 45%
);

animation:
lavaPulse 6s ease-in-out infinite;
}

/* ☁️ sky */
body[data-world="sky"]::before{

background:

radial-gradient(
circle at top,
rgba(255,255,255,0.38),
transparent 45%
),

radial-gradient(
circle at bottom,
rgba(186,230,253,0.25),
transparent 50%
);

animation:
skyFloat 10s ease-in-out infinite;
}

/* 🍬 candy */
body[data-world="candy"]::before{

background:

radial-gradient(
circle at top left,
rgba(244,114,182,0.28),
transparent 40%
),

radial-gradient(
circle at bottom right,
rgba(251,207,232,0.25),
transparent 45%
);

animation:
candyGlow 8s ease-in-out infinite;
}

/* 👑 castle */
body[data-world="castle"]::before{

background:

radial-gradient(
circle at center,
rgba(168,85,247,0.28),
transparent 40%
),

radial-gradient(
circle at top,
rgba(196,181,253,0.22),
transparent 45%
);

animation:
magicPulse 7s ease-in-out infinite;
}

@keyframes worldGlow{

0%{
   transform:scale(1);
   opacity:0.35;
}

50%{
   transform:scale(1.08);
   opacity:0.5;
}

100%{
   transform:scale(1);
   opacity:0.35;
}

}


@keyframes lavaPulse{

0%{
   transform:scale(1);
   opacity:0.35;
}

50%{
   transform:scale(1.12);
   opacity:0.55;
}

100%{
   transform:scale(1);
   opacity:0.35;
}

}

@keyframes skyFloat{

0%{
   transform:translateY(0px);
}

50%{
   transform:translateY(-12px);
}

100%{
   transform:translateY(0px);
}

}

@keyframes candyGlow{

0%{
   opacity:0.3;
}

50%{
   opacity:0.55;
}

100%{
   opacity:0.3;
}

}

@keyframes magicPulse{

0%{
   transform:scale(1);
   opacity:0.35;
}

50%{
   transform:scale(1.08);
   opacity:0.5;
}

100%{
   transform:scale(1);
   opacity:0.35;
}

}

.container{
display:flex;
min-height:100vh;
height:auto;
}

.left{
   flex:2;
   display:flex;
   justify-content:center;
   align-items:flex-start;
   padding-top:10px; /* 🔥 AGREGA ESTA */
}

.right{

flex:1;

padding:20px;

padding-top:260px;

overflow:auto;

/* 🌫 glass */
background:
rgba(255,255,255,0.42);

backdrop-filter:
blur(16px);

-webkit-backdrop-filter:
blur(16px);

/* ✨ profundidad */
box-shadow:
-8px 0 24px rgba(0,0,0,0.08);

/* borde suave */
border-left:
1px solid rgba(255,255,255,0.35);
}

/* CARD */

.card{
margin-top:340px;


/* glass premium */
background:rgba(255,255,255,0.58);

backdrop-filter:blur(18px);

-webkit-backdrop-filter:blur(18px);

padding:30px;

border-radius:34px;

width:900px;

text-align:center;

position:relative;

/* profundidad */
box-shadow:
0 10px 30px rgba(0,0,0,0.10),
0 0 40px rgba(108,92,231,0.08);

/* borde suave */
border:1px solid rgba(255,255,255,0.5);

overflow:visible;

transition:0.25s ease;
}

.card:hover{

transform:translateY(-2px);

box-shadow:
0 18px 40px rgba(0,0,0,0.12),
0 0 50px rgba(108,92,231,0.12);

}


.card{
   padding-bottom:120px; /* 🔥 DUPLICA ESPACIO */
}

.card::before{
   display:none;
}

@keyframes borderGlow{
0%{background-position:0%}
100%{background-position:300%}
}

/* HEADER */

.header{
display:flex;
align-items:center;
justify-content:space-between;
padding:0 20px;
position:relative;
}

.header h2{
position:relative;
left:auto;
transform:none;
margin:0 auto;

font-size:clamp(26px,3.5vw,40px);
font-weight:900;
letter-spacing:1px;

white-space:nowrap;
flex:1;
text-align:center;
}

.avatarArea{
display:flex;
flex-direction:column;
align-items:center;
gap:6px;
}

.avatar{
width:120px;
height:120px;
object-fit:contain;

/* ✨ avatar vivo */
animation:avatarFloat 3s ease-in-out infinite;

filter:
drop-shadow(0 6px 12px rgba(0,0,0,0.18))
drop-shadow(0 0 12px rgba(108,92,231,0.25));

transition:0.25s ease;
}

@keyframes avatarFloat{

0%{
   transform:translateY(0px) scale(1);
}

50%{
   transform:translateY(-6px) scale(1.03);
}

100%{
   transform:translateY(0px) scale(1);
}

}

/* SCORE */

.scoreRow{

   display:flex;

   justify-content:center;

color:#111;

   align-items:center;

   gap:14px;

   font-size:20px;
   font-weight:bold;

   flex-wrap:wrap;

   text-align:center;

   width:100%;
}

#levelUI{

   text-align:center;

   color:#111;

   font-weight:700;
}

/* =========================
🏆 RANKING PRO VISUAL
========================= */

.rankCard{
background:linear-gradient(135deg,#ffffff,#f1f2f6);
padding:22px;                 /* ⬆ más espacio */
border-radius:20px;
color:#2d3436;
box-shadow:0 12px 25px rgba(0,0,0,0.18);
text-align:center;
margin-top:20px;
}

.fireBar{
font-size:34px;              /* 🔥 MÁS GRANDE */
letter-spacing:6px;
margin-bottom:10px;
}

.rankBadge{
font-size:22px;              /* ⬆ más grande */
font-weight:900;
color:#2d3436;
padding:6px 14px;
border-radius:12px;
display:inline-block;
margin-bottom:10px;
}

.rankStats{
font-size:20px;              /* ⬆ texto más grande */
line-height:1.8;
font-weight:bold;
}

/* PROGRESS */

.progress{
   height:14px;
   background:#dfe6e9;
   border-radius:20px;
   margin:5px auto;
   width:calc(100% - 20px);
   overflow:hidden;
}

.bar{
   height:100%;
   width:0%;
   background: linear-gradient(90deg,#6366f1,#22c55e);
   border-radius:20px;
   transition: width 0.4s ease;
}

/* INPUTS */

select,input{
padding:8px;
border-radius:10px;
margin:5px;
}

/* BUTTONS */

button{
padding:10px 14px;
border-radius:12px;
border:none;
color:#fff;
font-weight:bold;
cursor:pointer;
margin:4px;

transition: transform 0.08s ease;

box-shadow:0 6px 0 rgba(0,0,0,0.2);
}

button:active{
transform:translateY(4px);
box-shadow:0 2px 0 rgba(0,0,0,0.2);
}

button:hover{
transform:scale(1.05);
}

/* BUTTON COLORS */

.start{background:#2ecc71;}
.repeat{background:#3498db;}
.prev{background:#e84393;}
.next{background:#f39c12;}
.practice{background:#6c5ce7;}
.apply{background:#2d3436;}

.show{background:#8e44ad;}
.btn-def{background:#e74c3c;}
.btn-mean{background:#16a085;}
.btn-sent{background:#1abc9c;}
.btn-img{background:#34495e;}

/* OPTIONS */

.option{
width:45%;
display:inline-block;
margin:6px;
padding:14px;
background:#ecf0f1;
border-radius:12px;
cursor:pointer;
font-size:22px;
text-align:center;
transition:0.2s;
}

.option:hover{
background:#dfe6e9;
transform:scale(1.05);
}

/* WORD */

#word{
   font-size:48px;   /* 🔥 un poco más compacto */
   margin:10px;      /* 🔥 menos espacio vertical */
   font-weight:bold;
}

/* 🔥 TYPING MODE */

#gifZone{
   position:fixed;
   top:50%;
   left:50%;
   transform:translate(-50%,-50%);
   width:220px;
   height:220px;
   z-index:200000;
   pointer-events:none !important;
}

.typingBox{
   position:fixed;
   left:0;
   width:100%;

   /* 🔥 CLAVE */
   bottom: env(keyboard-inset-height, 0);

   background:white;
   padding:12px 10px;

   z-index:9999;

   border-top:2px solid #eee;
   box-shadow:0 -6px 16px rgba(0,0,0,0.12);

   display:flex;
   flex-direction:column;
   align-items:center;

   transition: bottom 0.25s ease;
}

.typingInput{
   font-size:32px;
   padding:14px;
   border-radius:14px;
   border:2px solid #ccc;
   width:90%;
   max-width:400px;
   text-align:center;
   outline:none;
max-width:520px;

   /* ✏️ líneas tipo libreta */
   background:
      repeating-linear-gradient(
         to bottom,
         #ffffff,
         #ffffff 32px,
         #dfe6e9 33px
      );

   caret-color:#6c5ce7;
}

/* ✏️ animación escritura */
@keyframes writePop{
   0%{ transform:scale(0.9); opacity:0.6; }
   100%{ transform:scale(1); opacity:1; }
}

.typingInput.writing{
   animation:writePop 0.15s ease;
}

/* ✏️ highlight */
.typingInput.active{
   border:3px solid #6c5ce7;
   box-shadow:0 0 12px rgba(108,92,231,0.6);
   background:#f3f0ff;
}

.typingInput.writing{
   animation:writePop 0.15s ease;
}
.letterFeedback{
margin-top:10px;
font-size:40px;     /* 🔥 MÁS GRANDE */
letter-spacing:6px;
font-weight:bold;   /* 🔥 NEGRITA */
}

.correctLetter{
color:#2ecc71;
}

.wrongLetter{
color:#e74c3c;
}

/* WORD LIST */

.wordList{
display:flex;
gap:10px;
overflow-x:auto;
}

.column{
min-width:160px;
font-size:13px;
}

/* DICTIONARY */

.dictCard{
background:linear-gradient(180deg,#ffffff,#f8fbff);
padding:25px;
border-radius:25px;
box-shadow:0 15px 30px rgba(0,0,0,0.15);
text-align:center;
cursor:pointer;
}

.dictImage{
width:140px;
height:140px;
object-fit:contain;
margin-bottom:10px;
}

.dictWord{
font-size:clamp(18px,4vw,48px);  /* 🔥 MÁS REACTIVO */
font-weight:900;
color:#2c3e50;
letter-spacing:0.3px;
line-height:1.05;
margin:8px 0;
text-align:center;

white-space:nowrap;
overflow:hidden;
text-overflow:ellipsis;

max-width:100%;
}

/* =========================
🔊 WORD PRONUNCIATION EFFECT
========================= */

@keyframes wordBounce{
   0%{
      transform:scale(1);
      opacity:0.8;
   }
   40%{
      transform:scale(1.3);
   }
   60%{
      transform:scale(1.15);
   }
   100%{
      transform:scale(1.2);
      opacity:1;
   }
}

.wordSpeaking{
   animation:wordBounce 0.9s ease;
   transform:scale(1.2);
   color:#6c5ce7;
   text-shadow:0 0 12px rgba(108,92,231,0.9);
   filter:brightness(1.2);
   transition:0.2s ease;
}
.dictPhon{
color:#9b59b6;
font-style:italic;
margin-bottom:10px;
}

.dictCard div:not(.dictWord){
font-size:clamp(16px,2.5vw,20px);
}

.label{
font-weight:bold;
margin-top:12px;
padding:4px 10px;
border-radius:8px;
color:#fff;
display:inline-block;
min-width:100px;

font-size:clamp(11px,1.2vw,13px);

/* 🔥 AGREGA ESTO */
cursor:pointer;
transition:0.2s;

}

.label:hover{
   transform:scale(1.08);
   filter:brightness(1.1);
}

/* =========================
🔊 ACTIVE SPEAKING EFFECT
========================= */

.label.active{
   transform:scale(1.12);
   filter:brightness(1.3);
   box-shadow:0 0 12px rgba(255,255,255,0.8);
}

@keyframes pulseGlow{
   0%{ box-shadow:0 0 5px rgba(255,255,255,0.5); }
   50%{ box-shadow:0 0 20px rgba(255,255,255,1); }
   100%{ box-shadow:0 0 5px rgba(255,255,255,0.5); }
}

.label.active{
   animation:pulseGlow 1s infinite;
}

#output{
font-size:24px;
line-height:1.6;
margin-top:15px;
}

.label.def{background:#e74c3c;}
.label.mean{background:#16a085;}
.label.sent{background:#f39c12;}

/* =========================
✨ WORD POP ANIMATION
========================= */

@keyframes wordPop{

0%{
transform:scale(0.7);
opacity:0;
}

60%{
transform:scale(1.08);
opacity:1;
}

100%{
transform:scale(1);
}

}

/* IMAGE MODE PRO */

.imageGrid{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:12px;
margin-top:10px;
}

.imageOption{
width:140px;
height:140px;
background:#ecf0f1;
border-radius:16px;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
transition:0.2s;
}

.imageOption:hover{
transform:scale(1.05);
background:#dfe6e9;
}

.imageOption img{
max-width:90%;
max-height:90%;
object-fit:contain;
}

/* =========================
🧠 MEMORY MATCH MODE
========================= */

.memoryGrid{
display:grid;
grid-template-columns:repeat(auto-fit,110px);
gap:14px;
justify-content:center;
margin-top:20px;
margin-bottom:90px;
}

.memoryCard{
width:120px;
height:120px;
perspective:1000px;
cursor:pointer;
transition:transform .2s;
}

.memoryInner{
width:100%;
height:100%;
position:relative;
transform-style:preserve-3d;
transition:transform .6s cubic-bezier(.4,.2,.2,1);
}

.memoryCard.flipped .memoryInner{
transform:rotateY(180deg) scale(1.05);
}

.memoryFront,
.memoryBack{
position:absolute;
width:100%;
height:100%;
backface-visibility:hidden;
border-radius:14px;
display:flex;
align-items:center;
justify-content:center;
font-size:20px;
font-weight:bold;
}

.memoryFront{
color:white;
font-size:28px;
background:linear-gradient(145deg,#6a11cb,#2575fc);
box-shadow:0 6px 14px rgba(0,0,0,0.2);
}

.memoryBack{
background:#ffffff;
border:3px solid #6a11cb;
transform:rotateY(180deg);
font-size:22px;
font-weight:900;
color:#2c3e50;
}

.memoryBack img{
max-width:90%;
max-height:90%;
object-fit:contain;
}

.memoryCard:hover{
transform:scale(1.08);
filter:brightness(1.1);
}

.memoryCard img{
max-width:90%;
max-height:90%;
object-fit:contain;
}

/* =========================
🃏 SHUFFLE ANIMATION
========================= */

@keyframes shuffleIn{

0%{
transform:scale(0.2) rotate(-25deg);
opacity:0;
}

60%{
transform:scale(1.1) rotate(10deg);
opacity:1;
}

100%{
transform:scale(1) rotate(0deg);
}

}

.memoryCard{
animation:shuffleIn .45s ease;
}

.memoryHidden{
background:#34495e;
color:#34495e;
}

.memoryMatch{
background:#2ecc71;
color:white;
animation:matchGlow .6s ease;
}

@keyframes matchGlow{

0%{
transform:scale(1);
box-shadow:0 0 0 rgba(46,204,113,0);
}

50%{
transform:scale(1.12);
box-shadow:0 0 25px rgba(46,204,113,.8);
}

100%{
transform:scale(1);
box-shadow:0 0 10px rgba(46,204,113,.4);
}

}

.memoryMatch img{
animation:shine 1.2s infinite alternate;
}

@keyframes shine{

0%{
filter:brightness(1);
}

100%{
filter:brightness(1.4);
}

}

/* =========================
✨ MATCH EXPLOSION
========================= */

@keyframes matchExplosion{

0%{
transform:scale(1);
}

40%{
transform:scale(1.3);
}

70%{
transform:scale(0.9);
}

100%{
transform:scale(1);
}

}

.memoryMatch{
animation:matchExplosion .5s ease;
}


/* =========================
🏆 MEMORY COMPLETE MESSAGE
========================= */

.memoryWin{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:white;
padding:20px 30px;
border-radius:20px;
font-size:32px;
font-weight:bold;
color:#6a11cb;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
animation:memoryPop 0.6s ease;
z-index:10;
}

@keyframes memoryPop{

0%{
transform:translate(-50%,-50%) scale(0.5);
opacity:0;
}

70%{
transform:translate(-50%,-50%) scale(1.1);
opacity:1;
}

100%{
transform:translate(-50%,-50%) scale(1);
}

}

/* =========================
🎰 ROULETTE LETTER
========================= */

@keyframes rouletteSpin{
0%{transform:scale(0.8) rotate(-10deg);opacity:0;}
50%{transform:scale(1.2) rotate(5deg);}
100%{transform:scale(1) rotate(0deg);opacity:1;}
}

.roulette{
animation:rouletteSpin 0.2s ease;
}

/* =========================
🔥 COMBO SYSTEM
========================= */

.comboText{
position:absolute;
top:30%;
left:50%;
transform:translateX(-50%);
font-size:36px;
font-weight:900;
color:#e67e22;
pointer-events:none;
animation:comboPop 0.6s ease;

      {transform:"translate(-50%,-50%) scale(1.2)", opacity:1},
      {transform:"translate(-50%,-50%) scale(1)", opacity:0}

function magicSuccessFX(){

   let symbols = ["✨","⭐","💥","🌟"]

   for(let i=0;i<12;i++){

      let spark = document.createElement("div")

      spark.className = "spark"

      spark.innerText =
      symbols[Math.floor(Math.random()*symbols.length)]

      spark.style.left =
      Math.random()*100 + "vw"

      spark.style.top =

function normalize(word){

return word
.toLowerCase()
.trim()

// 🔥 FIX SCRIBBLE (iPad)
.replace(/0/g,"o")
.replace(/1/g,"l")
.replace(/3/g,"e")
.replace(/5/g,"s")
.replace(/6/g,"b")
.replace(/7/g,"t")
.replace(/8/g,"b")
.replace(/9/g,"a")

// 🔥 limpia caracteres raros
.replace(/[^a-z]/g,"")

}

// =========================
// 🧠 WEIGHTED WORD SELECTOR
// =========================

function getWordWeight(word){

   let data = getMastery()[word]

   if(!data){
      return 4   // 🔥 NUEVA palabra = prioridad media-alta
   }

   let score = data.score
   let fails = data.fails || 0

   let weight = 1

   if(score <= 2) weight = 5
   else if(score <= 5) weight = 3
   else if(score <= 8) weight = 1.5
   else weight = 0.5

   // 🚨 errores pesan MÁS que antes
   weight += fails * 2

   return weight
}

function getWeightedWord(list){

let now = Date.now()

// 🔥 solo palabras listas para revisión
let filtered = list.filter(item => {

   let data = getMastery()[item.word]

   // ❌ excluir palabras dominadas
   if(data && data.mastered){
      return false
   }

   if(!data) return true

   return !data.nextReview || data.nextReview <= now
})

// fallback si ninguna cumple
if(filtered.length === 0){

   // 🔥 fallback inteligente (no solo random)
   filtered = list.sort((a,b)=>{
      let wa = getWordWeight(a.word)
      let wb = getWordWeight(b.word)
      return wb - wa
   }).slice(0, Math.ceil(list.length * 0.5))
}

   let weighted = []

  filtered.forEach(item => {

      let weight = getWordWeight(item.word)

      // 🔥 multiplicamos la probabilidad
      for(let i=0;i<Math.floor(weight);i++){
         weighted.push(item)
      }

   })

   // 🛑 seguridad (nunca vacío)
   if(weighted.length === 0){
      return list[Math.floor(Math.random()*list.length)]
   }

   return weighted[Math.floor(Math.random() * weighted.length)]
}

/* =========================
🧠 MULTIPLE CHOICE PRO (ADULTO)
========================= */
function phoneticSimilarity(a,b){

a=a.toLowerCase()
b=b.toLowerCase()

let score=0

for(let i=0;i<Math.min(a.length,b.length);i++){
if(a[i]===b[i]) score++
}

return score
}
function renderMC(w){

let pool=wordDB.filter(x=>x.word!==w.word)

let similar = pool.filter(x=>{

   let a = x.word.toLowerCase()
   let b = w.word.toLowerCase()

   let lenDiff = Math.abs(a.length - b.length)

   // misma longitud o muy cercana
   let lengthCheck = lenDiff <= 1

   // mismo inicio (muy importante para dificultad)
   let startCheck = a[0] === b[0]

   // similitud fonética básica
   let phonScore = phoneticSimilarity(a,b) >= Math.floor(b.length * 0.5)

   // letras similares (al menos 50% iguales)
   let common = 0
   for(let i=0;i<Math.min(a.length,b.length);i++){
      if(a[i] === b[i]) common++
   }

   let similarityCheck = common >= Math.floor(b.length * 0.5)

   return lengthCheck && (startCheck || phonScore || similarityCheck)
})

let difficulty = getDifficulty(w.word)

if(difficulty === "hard"){

   similar = similar.sort((a,b)=>
      phoneticSimilarity(b.word,w.word) - phoneticSimilarity(a.word,w.word)
   ).slice(0,6)

}

let opts=[w.word]

// primero intentar con similares
let maxOptions = difficulty === "hard" ? 6 : 4

// 🔥 SAFE GENERATION (ANTI FREEZE)
let attempts = 0

while(opts.length < maxOptions && attempts < 20){

   let source = similar.length ? similar : pool

   let r = source[Math.floor(Math.random()*source.length)].word

   if(!opts.includes(r)){
      opts.push(r)
   }

   attempts++
}

// fallback seguro
while(opts.length < 4){

   let r = pool[Math.floor(Math.random()*pool.length)].word

   if(!opts.includes(r)){
      opts.push(r)
   }
}

opts=opts.sort(()=>Math.random()-0.5)

opts.forEach(o=>{

let d=document.createElement("div")
d.className="option"
d.innerText=o

d.onclick=()=>{

if(answered) return

document.querySelectorAll(".option").forEach(el=>{

})

checkAnswer(o)

setTimeout(()=>advanceGame(),400)
}
gameArea.appendChild(d)

})
}

function renderPracticeMode(){

// 🔥 combinar errores + débiles
let practiceList = wordDB.filter(w => {

   let m = mastery[w.word]?.score || 0

   return m < 4 || mistakes.includes(w.word)
})

// 🔥 ordenar por dificultad real
practiceList.sort((a,b)=>{

})

   return
}

updateProgress()

renderTyping(w)
}

      console.error("🚨 ERROR: word undefined en FillGap")
      return
   }

   let correctWord = w.word
   let masked = hideLetters(correctWord)

         }

   }

   updateDisplay()

   function moveToNextGap(){

/* =========================
🌐 VALIDACIÓN EXTERNA + IA SPEED RUN
========================= */

let globalUsedWords = new Set()
let usedWords = new Set()   // 👈 ESTA LÍNEA FALTA

async function isValidWordAPI(word){

try{

let res = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${word}`)
return res.ok

}catch(e){
return false
}

}

function getLetterBonus(letter){

letter = letter.toLowerCase()

let hard = ["q","z","x","j"]
let medium = ["k","v","w","y"]

if(hard.includes(letter)) return 1
if(medium.includes(letter)) return 0.5

return 0
}

function getAdaptiveAlphabet(){

let mastery = getMastery()

let weakLetters = {}

wordDB.forEach(w=>{

let m = mastery[w.word] || 0

if(m < 2){

let first = w.word[0].toLowerCase()

if(!weakLetters[first]) weakLetters[first]=0

weakLetters[first]++

}

})

let letters = []

for(let l in weakLetters){
for(let i=0;i<weakLetters[l];i++){
letters.push(l)
}
}

if(letters.length < 10){
return "abcdefghijklmnopqrstuvwxyz".split("")
}

return letters
}

/* =========================
⚡ SPEED RUN ENGINE
========================= */

function startSpeedGame(input, timerUI, scoreUI){

speedTime=60
speedScore=0
speedTotal=0
usedWords.clear()

input.disabled=false
input.focus()

/* ⚠️ limpiar eventos previos */
input.onkeydown=null

/* ⏱ TIMER */

if(speedTimer) clearInterval(speedTimer)

speedTimer=setInterval(()=>{

speedTime--
timerUI.innerText="Time: "+speedTime

if(speedTime<=0){

clearInterval(speedTimer)
input.disabled=true

showSpeedResult()

}

},1000) // ✅ AQUÍ se cierra correctamente

/* =========================
VALIDACIÓN (FUERA DEL TIMER)
========================= */

input.onkeydown = async function(e){

   if(e.key==="Enter"){

      let val=input.value
      input.value=""

      let clean = val.trim()

      // ❌ caracteres inválidos
      if(!/^[a-zA-Z\s-]+$/.test(clean)){
         safePlay("wrong")
         return
      }

      let normalized = clean.toLowerCase()

      if(clean.length > 15){
         safePlay("wrong")
         return
      }

      if(globalUsedWords.has(clean)){
         safePlay("wrong")
         return
      }


if(usedWords.size > 200){
   usedWords.clear()
}

      if(usedWords.has(clean)){
         safePlay("wrong")
         return
      }

      // 🔤 validar letra inicial
      if(!normalized.startsWith(speedLetter.toLowerCase())){
         safePlay("wrong")
         return
      }

      // 🌐 VALIDACIÓN
      let existsDB = wordDB.some(w => w.word === clean)

      let existsAPI = false


      let exists = existsDB || existsAPI

      speedTotal++

      if(exists){

         globalUsedWords.add(clean)
         usedWords.add(clean)

         speedCombo++

         let letterBonus = getLetterBonus(speedLetter)
         let points = 1 + (speedCombo * 0.2) + letterBonus

         speedScore += Math.floor(points)

         let tag=document.createElement("span")
         tag.innerText=clean
         tag.style.background="#2ecc71"
         tag.style.color="white"
         tag.style.padding="4px 8px"
         tag.style.borderRadius="8px"

         wordsBox.appendChild(tag)

         safePlay("correct")

      }else{

         safePlay("wrong")
         speedCombo = 0
      }

      scoreUI.innerText = speedScore+" / "+speedTotal

      showCombo(`x${speedCombo}`, speedCombo>=5)
   }
}

}

function showSpeedResult(){

let result=document.createElement("div")

result.style.position="absolute"
result.style.top="50%"
result.style.left="50%"
result.style.transform="translate(-50%,-50%)"
result.style.background="white"
result.style.padding="25px"
result.style.borderRadius="20px"
result.style.boxShadow="0 10px 25px rgba(0,0,0,0.3)"
result.style.textAlign="center"

let accuracy = speedTotal ? Math.round((speedScore/speedTotal)*100) : 0

result.innerHTML=`
<h2>🏆 RESULT</h2>
<p>Score: ${speedScore}</p>
<p>Total: ${speedTotal}</p>
<p>Accuracy: ${accuracy}%</p>
`

/* 🧠 GUARDAR RECORD */

let best=localStorage.getItem("speedBest")

if(!best || speedScore>best){
localStorage.setItem("speedBest",speedScore)
result.innerHTML+=`<p style="color:#27ae60">🔥 NEW RECORD!</p>`
}else{
result.innerHTML+=`<p>Best: ${best}</p>`
}

let btn=document.createElement("button")
btn.innerText="Play Again"
btn.style.background="#6a11cb"

btn.onclick=()=>{
result.remove()
renderSpeedRun()
}

result.appendChild(btn)

gameArea.appendChild(result)

playSound("win")
}

function showCombo(text,isFire=false){

comboUI=document.createElement("div")

}
